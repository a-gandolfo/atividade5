<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastros e Cursos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="table">
        <table>
            <thead>
                <tr>
                    <th>Curso</th>
                    <th>Carga Horária</th>
                    <th>Nível</th>
                    <th>Modalidade</th>
                    <th>Vagas Disponíveis</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>HTML e CSS</td>
                    <td>30h</td>
                    <td>Básico</td>
                    <td>Online</td>
                    <td>20</td>
                </tr>

                <tr>
                    <td>JavaScript</td>
                    <td>40h</td>
                    <td>Intermediário</td>
                    <td>Presencial</td>
                    <td>15</td>
                </tr>

                <tr>
                    <td>Banco de Dados</td>
                    <td>35h</td>
                    <td>Intermediário</td>
                    <td>Online</td>
                    <td>10</td>
                </tr>
            </tbody>
        </table>
    </section>
    <section>
        <form action="">
            <label for="form-nome">Nome Completo</label>
            <textarea rows="4" cols="5" type="text" id="form-nome"></textarea>

            <label for="form-email">Email</label>
            <input type="email" id="form-email">

        <label for="curso"></label>
        <select name="curso" id="curso">
            <option value="html-css">Html e Css</option>
            <option value="js">JavaScript</option>
            <option value="bd">Banco de Dados</option>
        </select>
    </section>
    <section class="form">
        <div>
                <p>Área de Interesse</p>
                <label for="form-html">HTML e CSS</label>
                <input type="radio" id="form-html">

                <label for="form-js">JavaScript</label>
                <input type="radio" id="form-js">

                <label for="form-bd">Banco de Dados</label>
                <input type="radio" id="form-bd">

                <label for="form-ia">Inteligência Artificial</label>
                <input type="radio" id="form-ia">
            </form>
        </div>
        <div>
            <button type="submit">Realizar Inscrição<button>
        </div>
    </section>
</body>
</html>
